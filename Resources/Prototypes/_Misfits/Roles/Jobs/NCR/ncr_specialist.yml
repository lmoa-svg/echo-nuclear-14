- type: job
  id: NCRWS
  setPreference: true
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 40
  showBorder: false
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-ncr-weapon-specialist
  description: job-description-ncr-weapon-specialist
  playTimeTracker: NCRWeaponSpecialist
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
      - Ghoul
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T4 faction timelock (12h NCR)
      department: NCR
      min: 43200 # 12 hours
    #- !type:CharacterPlaytimeRequirement # TEMP REMOVED
    #  tracker: NCRPrivateFirstClass
    #  min: 18000 # 5 hours
  startingGear: NCRWSGear
  icon: "JobIconNcrSpec" # Corvax-Change
  supervisors: job-supervisors-ncr-sergeant
  alwaysUseSpawner: true
  access:
  - NCR
  - NCRMedic # #Misfits Add - medic access folded in from consolidated NCR Medic role
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - NCR

- type: startingGear
  id: NCRWSGear
  equipment:
    head: N14ClothingHeadHatNCRHelmetMetalDesert
    back: N14ClothingBackpackNCR # Corvax-Change
    jumpsuit: N14ClothingUniformNCRDesert # Corvax-Change
    outerClothing: MisfitsNCRPouchedCombatArmor # #Misfits Tweak: T4 armor (0.75/0.70) — Specialist gets combat-grade protection while keeping utility pouches
    shoes: N14ClothingBootsLeatherFilled
    ears: N14ClothingHeadsetNCR # #Misfits Add - NCR radio earpiece

    belt: ClothingBeltNCR
    pocket1: NCRwsloadoutkits
    id: N14IDNCRDogtagWS
  innerClothingSkirt: N14ClothingUniformNCRDesert # Corvax-Change
  satchel: N14ClothingBackpackSatchelNCRFilled
  storage: # Corvax-Change
    back:
    - N14BoxPlasticFilledMilitaryNCR

- type: playTimeTracker
  id: NCRWeaponSpecialist
