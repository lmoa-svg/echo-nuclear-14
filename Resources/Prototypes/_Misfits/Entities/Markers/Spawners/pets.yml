# Follower pet spawner

- type: entity
  parent: MisfitsPetSpawnerBase
  id: MisfitsSpawnerRabbitFollowersPet
  name: dr. thumper rabbit pet followers spawner
  components:
  - type: GhostRole
    name: ghost-role-information-misfitpet-rabbit-followers-name
    description: ghost-role-information-misfit-faction-description
    rules: ghost-role-component-default-rules
  - type: GhostRoleMobSpawner
    prototype: MisfitsMobRabbitFollowersPet
  - type: Sprite
    layers:
    - state: green
    - state: rabbit
      sprite: _Nuclear14/Mobs/Animals/rabbit.rsi
  - type: ConditionalSpawner
    prototypes:
    - MisfitsMobRabbitFollowersPet

