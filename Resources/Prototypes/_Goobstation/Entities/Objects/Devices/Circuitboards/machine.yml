- type: entity
  parent: BaseMachineCircuitboard
  id: VinylPlayerCircuitboard
  name: vinyl player machine board
  description: A machine printed circuit board for a vinyl player.
  components:
  - type: Sprite
    state: service
  - type: MachineBoard
    prototype: VinylPlayer
    tagRequirements:
      N14Diode:
        ExamineName: diode
        DefaultPrototype: N14JunkComponentDiode1
        Amount: 1
      N14Fuse:
        ExamineName: fuse
        DefaultPrototype: N14JunkComponentFuse1
        Amount: 1
    materialRequirements:
      Steel: 1
      WoodPlank: 3
      Cable: 2

- type: entity
  parent: BaseMachineCircuitboard
  id: TapeDeckCircuitboard
  name: tape deck machine board
  description: A machine printed circuit board for a tape deck.
  components:
  - type: Sprite
    state: service
  - type: MachineBoard
    prototype: TapeDeck
    requirements:
        Capacitor: 2
    tagRequirements:
      N14Fuse: 
        ExamineName: fuse
        DefaultPrototype: N14JunkComponentFuse1
        Amount: 1
    materialRequirements:
      Plastic: 3
      WoodPlank: 5
      Cable: 4

